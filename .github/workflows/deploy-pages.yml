# Deploy frontend to GitHub Pages. Backend stays on Render; set RENDER_API_URL secret.
name: Deploy to GitHub Pages

on:
  push:
    branches: [feature/pulkit]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.RENDER_API_URL }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          cd frontend
          npm ci
          npm run build:pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@4
